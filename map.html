<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPulse - Collective Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="archive.js"></script>
    <style>
        :root {
            --deep-night: #0B0C10;
            --neon-violet: #C3073F;
            --aurora-green: #4EFFF3;
            --mystic-purple: #A855F7;
        }
        
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        
        body {
            background: var(--deep-night);
            background-image: 
                radial-gradient(ellipse at top, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(78, 255, 243, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            color: #E5E7EB;
        }
        
        .glass {
            background: rgba(31, 40, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }
        
        #map {
            height: 600px;
            border-radius: 12px;
            border: 2px solid rgba(168, 85, 247, 0.3);
        }
        
        .dream-icon {
            background: rgba(168, 85, 247, 0.9);
            border: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--mystic-purple), #7C3AED);
            border: 1px solid rgba(168, 85, 247, 0.5);
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-8">
            <a href="index.html" class="flex items-center gap-3">
                <span class="text-3xl">🌙</span>
                <span class="text-2xl font-bold">DreamPulse</span>
            </a>
            <a href="index.html" class="glass px-4 py-2 rounded-lg hover:bg-purple-500/20">← Back</a>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-4 text-center neon-glow">
                <div class="text-3xl font-bold text-purple-400" id="totalDreams">0</div>
                <div class="text-sm text-gray-400">Total Dreams</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-blue-400" id="totalCountries">0</div>
                <div class="text-sm text-gray-400">Countries</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-green-400" id="totalLanguages">0</div>
                <div class="text-sm text-gray-400">Languages</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-yellow-400" id="todayDreams">0</div>
                <div class="text-sm text-gray-400">Today</div>
            </div>
        </div>

        <!-- MAP -->
        <div id="map" class="mb-8"></div>

        <!-- FORECASTS -->
        <div id="forecasts" class="glass rounded-xl p-6 mb-8">
            <h3 class="text-2xl font-bold mb-6">🔮 Regional Forecasts</h3>
            <div id="forecastContent" class="text-gray-300">
                <p class="text-center text-gray-500">Click anywhere on the map to generate a forecast</p>
            </div>
        </div>

        <!-- LIVE FEED -->
        <div class="glass rounded-xl p-6">
            <h3 class="text-2xl font-bold mb-6">📡 Live Dream Feed</h3>
            <div id="liveFeed" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ============ MAP ============
        const map = L.map('map').setView([30, 20], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markers = [];

        function loadDreams() {
            const dreams = dreamArchive.getAll();
            
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            dreams.forEach(dream => {
                if (!dream.lat || !dream.lng) return;
                
                const icon = L.divIcon({
                    className: 'dream-icon',
                    html: '🌙'
                });
                
                const marker = L.marker([dream.lat, dream.lng], { icon })
                    .addTo(map)
                    .bindPopup(`
                        <div style="color: #1a1a2e; max-width: 300px;">
                            <p style="font-size: 14px; margin-bottom: 8px;">${dream.text}</p>
                            <small style="color: #666;">📍 ${dream.country}<br>🕐 ${new Date(dream.timestamp).toLocaleDateString()}</small>
                        </div>
                    `);
                
                markers.push(marker);
            });
            
            const stats = dreamArchive.getStats();
            document.getElementById('totalDreams').textContent = stats.total;
            document.getElementById('totalCountries').textContent = stats.countries;
            document.getElementById('totalLanguages').textContent = stats.languages;
            document.getElementById('todayDreams').textContent = dreamArchive.getToday().length;
            
            renderFeed(dreams);
        }

        function renderFeed(dreams) {
            const container = document.getElementById('liveFeed');
            container.innerHTML = '';
            
            const sorted = dreams.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            const display = sorted.slice(0, 20);
            
            display.forEach(dream => {
                const div = document.createElement('div');
                div.className = 'glass rounded-lg p-4';
                div.innerHTML = `
                    <p class="text-gray-200 mb-2">${dream.text}</p>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>📍 ${dream.country}</span>
                        <span>🕐 ${getTimeAgo(new Date(dream.timestamp))}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        // ============ MAP CLICK → FORECAST ============
        map.on('click', async function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                const region = data.address.country || 'Unknown Region';
                
                const forecast = await generateForecast(region, lat, lng);
                
                document.getElementById('forecastContent').innerHTML = `
                    <h4 class="text-xl font-bold mb-3 text-purple-300">🌍 ${region}</h4>
                    <p class="text-gray-200 leading-relaxed">${forecast}</p>
                `;
                
                document.getElementById('forecasts').scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                alert('Error generating forecast');
            }
        });

        async function generateForecast(region, lat, lng) {
            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) return 'API key not set';
            
            const regionDreams = dreamArchive.getByRegion(lat, lng, 15);
            const dreamSample = regionDreams.slice(0, 3).map(d => d.text).join(' | ') || 'No recent dreams';
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {
                                role: 'system',
                                content: `You are the DreamPulse Oracle. Generate a short forecast (2-3 sentences, max 60 words) for ${region} based on these dreams: ${dreamSample}. Talk ONLY about dreams and symbols.`
                            }
                        ],
                        temperature: 0.8,
                        max_tokens: 150
                    })
                });
                
                const data = await response.json();
                return data.choices[0].message.content;
                
            } catch (error) {
                return 'Error generating forecast';
            }
        }

        // ============ INIT ============
        window.addEventListener('DOMContentLoaded', () => {
            loadDreams();
        });
    </script>
</body>
</html>
