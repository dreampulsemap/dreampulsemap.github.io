<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPulse - Collective Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="archive.js"></script>
    <style>
        :root {
            --deep-night: #0B0C10;
            --aurora-green: #4EFFF3;
            --mystic-purple: #A855F7;
        }
        
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        
        body {
            background: var(--deep-night);
            background-image: 
                radial-gradient(ellipse at top, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(78, 255, 243, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            color: #E5E7EB;
        }
        
        .glass {
            background: rgba(31, 40, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        
        .glass-strong {
            background: rgba(31, 40, 51, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8);
        }
        
        #map {
            height: 600px;
            border-radius: 12px;
            border: 2px solid rgba(168, 85, 247, 0.3);
        }
        
        .dream-icon {
            background: rgba(168, 85, 247, 0.9);
            border: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--mystic-purple), #7C3AED);
            border: 1px solid rgba(168, 85, 247, 0.5);
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }
        
        .lang-dropdown {
            transform-origin: top;
            animation: dropIn 0.3s ease-out;
        }
        
        @keyframes dropIn {
            from { opacity: 0; transform: scaleY(0.8); }
            to { opacity: 1; transform: scaleY(1); }
        }
        
        .lang-btn {
            transition: all 0.2s;
        }
        
        .lang-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="fixed top-0 left-0 right-0 z-50 glass-strong border-b border-purple-500/20">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between max-w-7xl">
            <a href="index.html" class="flex items-center gap-3">
                <span class="text-3xl">🌙</span>
                <span class="text-2xl font-bold neon-text">DreamPulse</span>
            </a>
            
            <div class="flex items-center gap-3">
                <!-- Language Selector -->
                <div class="relative">
                    <button onclick="toggleLangMenu()" class="glass px-4 py-2 rounded-lg hover:bg-purple-500/20 transition flex items-center gap-2">
                        <span id="currentLang">🇬🇧 EN</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    
                    <div id="langMenu" class="hidden lang-dropdown absolute right-0 mt-2 w-48 glass-strong rounded-xl overflow-hidden shadow-2xl">
                        <button onclick="changeLang('en')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇬🇧</span><span>English</span>
                        </button>
                        <button onclick="changeLang('tr')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇹🇷</span><span>Türkçe</span>
                        </button>
                        <button onclick="changeLang('es')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇪🇸</span><span>Español</span>
                        </button>
                        <button onclick="changeLang('ar')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇸🇦</span><span>العربية</span>
                        </button>
                        <button onclick="changeLang('hi')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇮🇳</span><span>हिन्दी</span>
                        </button>
                        <button onclick="changeLang('zh')" class="lang-btn w-full px-4 py-3 text-left flex items-center gap-3">
                            <span class="text-xl">🇨🇳</span><span>中文</span>
                        </button>
                    </div>
                </div>
                
                <a href="index.html" class="glass px-4 py-2 rounded-lg hover:bg-purple-500/20">
                    <span id="backBtn">← Back</span>
                </a>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 pt-24 pb-16 max-w-7xl">
        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-4 text-center neon-glow">
                <div class="text-3xl font-bold text-purple-400" id="totalDreams">0</div>
                <div class="text-sm text-gray-400" id="statTotal">Total Dreams</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-blue-400" id="totalCountries">0</div>
                <div class="text-sm text-gray-400" id="statCountries">Countries</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-green-400" id="totalLanguages">0</div>
                <div class="text-sm text-gray-400" id="statLanguages">Languages</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-yellow-400" id="todayDreams">0</div>
                <div class="text-sm text-gray-400" id="statToday">Today</div>
            </div>
        </div>

        <!-- MAP -->
        <div id="map" class="mb-8"></div>

        <!-- FORECASTS -->
        <div id="forecasts" class="glass rounded-xl p-6 mb-8">
            <h3 class="text-2xl font-bold mb-6" id="forecastTitle">🔮 Regional Forecasts</h3>
            <div id="forecastContent" class="text-gray-300">
                <p class="text-center text-gray-500" id="forecastHint">Click anywhere on the map to generate a forecast</p>
            </div>
        </div>

        <!-- LIVE FEED -->
        <div class="glass rounded-xl p-6">
            <h3 class="text-2xl font-bold mb-6" id="feedTitle">📡 Live Dream Feed</h3>
            <div id="liveFeed" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ============ 🌍 TRANSLATIONS ============
        const translations = {
            en: {
                backBtn: "← Back",
                statTotal: "Total Dreams",
                statCountries: "Countries",
                statLanguages: "Languages",
                statToday: "Today",
                forecastTitle: "🔮 Regional Forecasts",
                forecastHint: "Click anywhere on the map to generate a forecast",
                feedTitle: "📡 Live Dream Feed"
            },
            tr: {
                backBtn: "← Geri",
                statTotal: "Toplam Rüya",
                statCountries: "Ülke",
                statLanguages: "Dil",
                statToday: "Bugün",
                forecastTitle: "🔮 Bölgesel Tahminler",
                forecastHint: "Tahmin oluşturmak için haritaya tıkla",
                feedTitle: "📡 Canlı Rüya Akışı"
            },
            es: {
                backBtn: "← Atrás",
                statTotal: "Sueños Totales",
                statCountries: "Países",
                statLanguages: "Idiomas",
                statToday: "Hoy",
                forecastTitle: "🔮 Pronósticos Regionales",
                forecastHint: "Haz clic en el mapa para generar un pronóstico",
                feedTitle: "📡 Feed en Vivo"
            },
            ar: {
                backBtn: "← رجوع",
                statTotal: "إجمالي الأحلام",
                statCountries: "الدول",
                statLanguages: "اللغات",
                statToday: "اليوم",
                forecastTitle: "🔮 التوقعات الإقليمية",
                forecastHint: "انقر على الخريطة لإنشاء توقع",
                feedTitle: "📡 البث المباشر"
            },
            hi: {
                backBtn: "← वापस",
                statTotal: "कुल सपने",
                statCountries: "देश",
                statLanguages: "भाषाएँ",
                statToday: "आज",
                forecastTitle: "🔮 क्षेत्रीय पूर्वानुमान",
                forecastHint: "पूर्वानुमान के लिए मानचित्र पर क्लिक करें",
                feedTitle: "📡 लाइव फ़ीड"
            },
            zh: {
                backBtn: "← 返回",
                statTotal: "总梦境",
                statCountries: "国家",
                statLanguages: "语言",
                statToday: "今天",
                forecastTitle: "🔮 区域预测",
                forecastHint: "点击地图生成预测",
                feedTitle: "📡 实时流"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function toggleLangMenu() {
            document.getElementById('langMenu').classList.toggle('hidden');
        }

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateUI();
            toggleLangMenu();
        }

        function updateUI() {
            const t = translations[currentLang];
            const langNames = { en: '🇬🇧 EN', tr: '🇹🇷 TR', es: '🇪🇸 ES', ar: '🇸🇦 AR', hi: '🇮🇳 HI', zh: '🇨🇳 ZH' };
            
            document.getElementById('currentLang').textContent = langNames[currentLang];
            
            Object.keys(t).forEach(key => {
                const el = document.getElementById(key);
                if (el) el.textContent = t[key];
            });
            
            document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
        }

        // ============ MAP ============
        const map = L.map('map').setView([30, 20], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markers = [];

        function loadDreams() {
            const dreams = dreamArchive.getAll();
            
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            dreams.forEach(dream => {
                if (!dream.lat || !dream.lng) return;
                
                const icon = L.divIcon({
                    className: 'dream-icon',
                    html: '🌙'
                });
                
                const marker = L.marker([dream.lat, dream.lng], { icon })
                    .addTo(map)
                    .bindPopup(`
                        <div style="color: #1a1a2e; max-width: 300px;">
                            <p style="font-size: 14px; margin-bottom: 8px;">${dream.text}</p>
                            <small style="color: #666;">📍 ${dream.country}<br>🕐 ${new Date(dream.timestamp).toLocaleDateString()}</small>
                        </div>
                    `);
                
                markers.push(marker);
            });
            
            const stats = dreamArchive.getStats();
            document.getElementById('totalDreams').textContent = stats.total;
            document.getElementById('totalCountries').textContent = stats.countries;
            document.getElementById('totalLanguages').textContent = stats.languages;
            document.getElementById('todayDreams').textContent = dreamArchive.getToday().length;
            
            renderFeed(dreams);
        }

        function renderFeed(dreams) {
            const container = document.getElementById('liveFeed');
            container.innerHTML = '';
            
            const sorted = dreams.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            const display = sorted.slice(0, 20);
            
            display.forEach(dream => {
                const div = document.createElement('div');
                div.className = 'glass rounded-lg p-4';
                div.innerHTML = `
                    <p class="text-gray-200 mb-2">${dream.text}</p>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>📍 ${dream.country}</span>
                        <span>🕐 ${getTimeAgo(new Date(dream.timestamp))}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        // ============ MAP CLICK → FORECAST ============
        map.on('click', async function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                const region = data.address.country || 'Unknown Region';
                
                const forecast = await generateForecast(region, lat, lng);
                
                document.getElementById('forecastContent').innerHTML = `
                    <h4 class="text-xl font-bold mb-3 text-purple-300">🌍 ${region}</h4>
                    <p class="text-gray-200 leading-relaxed">${forecast}</p>
                `;
                
                document.getElementById('forecasts').scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                alert('Error generating forecast');
            }
        });

        async function generateForecast(region, lat, lng) {
            const apiKey = localStorage.getItem('groq_api_key');
            if (!apiKey) return 'API key not set';
            
            const regionDreams = dreamArchive.getByRegion(lat, lng, 15);
            const dreamSample = regionDreams.slice(0, 3).map(d => d.text).join(' | ') || 'No recent dreams';
            
            const langNames = { en: 'English', tr: 'Turkish', es: 'Spanish', ar: 'Arabic', hi: 'Hindi', zh: 'Chinese' };
            const targetLang = langNames[currentLang] || 'English';
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {
                                role: 'system',
                                content: `You are the DreamPulse Oracle. Generate a short forecast (2-3 sentences, max 60 words) for ${region} based on these dreams: ${dreamSample}. Talk ONLY about dreams and symbols. RESPOND ONLY in ${targetLang}.`
                            }
                        ],
                        temperature: 0.8,
                        max_tokens: 150
                    })
                });
                
                const data = await response.json();
                return data.choices[0].message.content;
                
            } catch (error) {
                return 'Error generating forecast';
            }
        }

        // ============ INIT ============
        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
            loadDreams();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                document.getElementById('langMenu').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
