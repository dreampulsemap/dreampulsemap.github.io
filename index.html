<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPulse - Collective Unconscious Navigation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .glow {
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }
        .glow-hover:hover {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }
        .lang-dropdown {
            transition: all 0.3s;
        }
        .lang-dropdown:hover {
            background: rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body class="text-white">
    <!-- DİL SEÇİMİ (SAĞ ÜST) -->
    <div class="fixed top-4 right-4 z-50">
        <div class="relative">
            <button onclick="toggleLangMenu()" class="lang-dropdown bg-slate-800/80 backdrop-blur-sm border border-purple-500/30 rounded-lg px-4 py-2 flex items-center gap-2">
                <span id="currentLang">🇬🇧 EN</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            
            <div id="langMenu" class="hidden absolute right-0 mt-2 w-48 bg-slate-800/95 backdrop-blur-sm border border-purple-500/30 rounded-lg overflow-hidden">
                <button onclick="changeLang('en')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇬🇧 English</button>
                <button onclick="changeLang('tr')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇹🇷 Türkçe</button>
                <button onclick="changeLang('es')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇪🇸 Español</button>
                <button onclick="changeLang('ar')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇸🇦 العربية</button>
                <button onclick="changeLang('hi')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇮🇳 हिन्दी</button>
                <button onclick="changeLang('zh')" class="w-full px-4 py-3 text-left hover:bg-purple-600/20 transition">🇨🇳 中文</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-16 max-w-4xl">
        <!-- BAŞLIK -->
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold mb-4">🌙 DreamPulse</h1>
            <p class="text-xl text-purple-300" id="subtitle">Collective Unconscious Navigation</p>
        </div>

        <!-- ORTA: HARİTAYA GİT BUTONU -->
        <div class="text-center mb-16">
            <a href="map.html" class="inline-block bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold text-2xl px-12 py-6 rounded-2xl glow glow-hover transition-all">
                🌍 <span id="mapBtn">Go to Map</span>
            </a>
        </div>

        <!-- ALT: RÜYA PAYLAŞ & ANALİZ BUTONLARI -->
        <div class="grid md:grid-cols-2 gap-6 mb-12">
            <!-- Rüya Paylaş -->
            <div class="bg-slate-800/50 rounded-2xl p-8 glow">
                <div class="text-center">
                    <div class="text-5xl mb-4">💭</div>
                    <h2 class="text-2xl font-bold mb-3" id="shareTitle">Share Your Dream</h2>
                    <p class="text-gray-400 mb-6" id="shareDesc">Add your dream to the collective map</p>
                    <button onclick="showDreamModal()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 rounded-xl transition">
                        <span id="shareBtn">Share Dream</span>
                    </button>
                </div>
            </div>

            <!-- Rüya Analizi -->
            <div class="bg-slate-800/50 rounded-2xl p-8 glow">
                <div class="text-center">
                    <div class="text-5xl mb-4">🔮</div>
                    <h2 class="text-2xl font-bold mb-3" id="analyzeTitle">Dream Analysis</h2>
                    <p class="text-gray-400 mb-6" id="analyzeDesc">Get Jungian interpretation from AI</p>
                    <button onclick="showAnalyzeModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl transition">
                        <span id="analyzeBtn">Analyze Dream</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- API KEY AYARI -->
        <div class="text-center text-sm text-gray-400">
            <button onclick="showApiKeyInput()" class="text-purple-400 hover:text-purple-300 underline">
                <span id="apiKeyLink">⚙️ Set Groq API Key</span>
            </button>
        </div>
    </div>

    <!-- RÜYA PAYLAŞ MODAL -->
    <div id="dreamModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold" id="modalShareTitle">Share Your Dream</h3>
                <button onclick="closeDreamModal()" class="text-gray-400 hover:text-white text-3xl">&times;</button>
            </div>
            
            <textarea 
                id="dreamInput" 
                rows="8" 
                placeholder="Last night I dreamed of a bear in a dark forest..."
                class="w-full bg-slate-900/50 border border-purple-500/30 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 mb-4"
            ></textarea>
            
            <div class="flex gap-3">
                <button onclick="saveDream()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
                    <span id="modalSaveBtn">💾 Save to Map</span>
                </button>
                <button onclick="closeDreamModal()" class="px-6 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition">
                    <span id="modalCancelBtn">Cancel</span>
                </button>
            </div>
        </div>
    </div>

    <!-- RÜYA ANALİZ MODAL -->
    <div id="analyzeModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold" id="modalAnalyzeTitle">Jungian Analysis</h3>
                <button onclick="closeAnalyzeModal()" class="text-gray-400 hover:text-white text-3xl">&times;</button>
            </div>
            
            <textarea 
                id="analyzeInput" 
                rows="8" 
                placeholder="Describe your dream..."
                class="w-full bg-slate-900/50 border border-blue-500/30 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 mb-4"
            ></textarea>
            
            <button 
                onclick="analyzeDream()" 
                id="analyzeBtnModal"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition mb-4"
            >
                <span id="modalAnalyzeBtn">🔮 Get Analysis</span>
            </button>
            
            <div id="analysisResult" class="hidden bg-slate-900/50 rounded-xl p-6">
                <h4 class="text-lg font-semibold mb-3 text-blue-300">🐻 Analysis</h4>
                <div id="analysisText" class="text-gray-200 leading-relaxed"></div>
            </div>
        </div>
    </div>

    <!-- API KEY MODAL -->
    <div id="apiKeyModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl p-8 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">Groq API Key</h3>
            <input 
                type="password" 
                id="apiKeyInput" 
                placeholder="gsk_..."
                class="w-full bg-slate-900/50 border border-purple-500/30 rounded-xl p-3 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 mb-4"
            >
            <div class="flex gap-3">
                <button onclick="saveApiKey()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl transition">
                    Save
                </button>
                <button onclick="closeApiKeyModal()" class="px-6 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 rounded-xl transition">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============ ÇOKLU DİL DESTEĞİ ============
        const translations = {
            en: {
                subtitle: "Collective Unconscious Navigation",
                mapBtn: "Go to Map",
                shareTitle: "Share Your Dream",
                shareDesc: "Add your dream to the collective map",
                shareBtn: "Share Dream",
                analyzeTitle: "Dream Analysis",
                analyzeDesc: "Get Jungian interpretation from AI",
                analyzeBtn: "Analyze Dream",
                apiKeyLink: "⚙️ Set Groq API Key",
                modalShareTitle: "Share Your Dream",
                modalSaveBtn: "💾 Save to Map",
                modalCancelBtn: "Cancel",
                modalAnalyzeTitle: "Jungian Analysis",
                modalAnalyzeBtn: "🔮 Get Analysis",
                placeholder: "Last night I dreamed of a bear in a dark forest...",
                analyzePlaceholder: "Describe your dream..."
            },
            tr: {
                subtitle: "Kolektif Bilinçaltı Navigasyonu",
                mapBtn: "Haritaya Git",
                shareTitle: "Rüyanı Paylaş",
                shareDesc: "Rüyanı kolektif haritaya ekle",
                shareBtn: "Rüyayı Paylaş",
                analyzeTitle: "Rüya Analizi",
                analyzeDesc: "AI'dan Jungian yorum al",
                analyzeBtn: "Rüyayı Analiz Et",
                apiKeyLink: "⚙️ Groq API Key Ayarla",
                modalShareTitle: "Rüyanı Paylaş",
                modalSaveBtn: "💾 Haritaya Kaydet",
                modalCancelBtn: "İptal",
                modalAnalyzeTitle: "Jungian Analiz",
                modalAnalyzeBtn: "🔮 Analiz Al",
                placeholder: "Dün gece karanlık bir ormanda ayı gördüm...",
                analyzePlaceholder: "Rüyanı anlat..."
            },
            es: {
                subtitle: "Navegación del Inconsciente Colectivo",
                mapBtn: "Ir al Mapa",
                shareTitle: "Comparte tu Sueño",
                shareDesc: "Agrega tu sueño al mapa colectivo",
                shareBtn: "Compartir Sueño",
                analyzeTitle: "Análisis de Sueños",
                analyzeDesc: "Obtén interpretación junguiana de IA",
                analyzeBtn: "Analizar Sueño",
                apiKeyLink: "⚙️ Configurar Groq API Key",
                modalShareTitle: "Comparte tu Sueño",
                modalSaveBtn: "💾 Guardar en Mapa",
                modalCancelBtn: "Cancelar",
                modalAnalyzeTitle: "Análisis Junguiano",
                modalAnalyzeBtn: "🔮 Obtener Análisis",
                placeholder: "Anoche soñé con un oso en un bosque oscuro...",
                analyzePlaceholder: "Describe tu sueño..."
            },
            ar: {
                subtitle: "الملاحة في اللاوعي الجمعي",
                mapBtn: "اذهب إلى الخريطة",
                shareTitle: "شارك حلمك",
                shareDesc: "أضف حلمك إلى الخريطة الجماعية",
                shareBtn: "مشاركة الحلم",
                analyzeTitle: "تحليل الأحلام",
                analyzeDesc: "احصل على تفسير يونغي من الذكاء الاصطناعي",
                analyzeBtn: "تحليل الحلم",
                apiKeyLink: "⚙️ ضبط مفتاح Groq API",
                modalShareTitle: "شارك حلمك",
                modalSaveBtn: "💾 حفظ في الخريطة",
                modalCancelBtn: "إلغاء",
                modalAnalyzeTitle: "التحليل اليونغي",
                modalAnalyzeBtn: "🔮 احصل على التحليل",
                placeholder: "حلمت الليلة بدم في غابة مظلمة...",
                analyzePlaceholder: "صف حلمك..."
            },
            hi: {
                subtitle: "सामूहिक अवचेतन नेविगेशन",
                mapBtn: "मानचित्र पर जाएं",
                shareTitle: "अपना सपना साझा करें",
                shareDesc: "अपने सपने को सामूहिक मानचित्र में जोड़ें",
                shareBtn: "सपना साझा करें",
                analyzeTitle: "सपना विश्लेषण",
                analyzeDesc: "AI से जुंगियान व्याख्या प्राप्त करें",
                analyzeBtn: "सपना विश्लेषण करें",
                apiKeyLink: "⚙️ Groq API Key सेट करें",
                modalShareTitle: "अपना सपना साझा करें",
                modalSaveBtn: "💾 मानचित्र में सहेजें",
                modalCancelBtn: "रद्द करें",
                modalAnalyzeTitle: "जुंगियान विश्लेषण",
                modalAnalyzeBtn: "🔮 विश्लेषण प्राप्त करें",
                placeholder: "कल रात मैंने एक अंधेरे जंगल में भालू का सपना देखा...",
                analyzePlaceholder: "अपने सपने का वर्णन करें..."
            },
            zh: {
                subtitle: "集体潜意识导航",
                mapBtn: "前往地图",
                shareTitle: "分享你的梦",
                shareDesc: "将你的梦添加到集体地图",
                shareBtn: "分享梦",
                analyzeTitle: "梦境分析",
                analyzeDesc: "从AI获取荣格解读",
                analyzeBtn: "分析梦",
                apiKeyLink: "⚙️ 设置Groq API密钥",
                modalShareTitle: "分享你的梦",
                modalSaveBtn: "💾 保存到地图",
                modalCancelBtn: "取消",
                modalAnalyzeTitle: "荣格分析",
                modalAnalyzeBtn: "🔮 获取分析",
                placeholder: "昨晚我梦见黑暗森林中的一只熊...",
                analyzePlaceholder: "描述你的梦..."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function toggleLangMenu() {
            document.getElementById('langMenu').classList.toggle('hidden');
        }

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateUI();
            toggleLangMenu();
        }

        function updateUI() {
            const t = translations[currentLang];
            const langNames = { en: '🇬🇧 EN', tr: '🇹🇷 TR', es: '🇪🇸 ES', ar: '🇸🇦 AR', hi: '🇮🇳 HI', zh: '🇨🇳 ZH' };
            
            document.getElementById('currentLang').textContent = langNames[currentLang];
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('mapBtn').textContent = t.mapBtn;
            document.getElementById('shareTitle').textContent = t.shareTitle;
            document.getElementById('shareDesc').textContent = t.shareDesc;
            document.getElementById('shareBtn').textContent = t.shareBtn;
            document.getElementById('analyzeTitle').textContent = t.analyzeTitle;
            document.getElementById('analyzeDesc').textContent = t.analyzeDesc;
            document.getElementById('analyzeBtn').textContent = t.analyzeBtn;
            document.getElementById('apiKeyLink').textContent = t.apiKeyLink;
            document.getElementById('modalShareTitle').textContent = t.modalShareTitle;
            document.getElementById('modalSaveBtn').textContent = t.modalSaveBtn;
            document.getElementById('modalCancelBtn').textContent = t.modalCancelBtn;
            document.getElementById('modalAnalyzeTitle').textContent = t.modalAnalyzeTitle;
            document.getElementById('modalAnalyzeBtn').textContent = t.modalAnalyzeBtn;
            document.getElementById('dreamInput').placeholder = t.placeholder;
            document.getElementById('analyzeInput').placeholder = t.analyzePlaceholder;
            
            // RTL desteği (Arapça için)
            if (currentLang === 'ar') {
                document.body.style.direction = 'rtl';
            } else {
                document.body.style.direction = 'ltr';
            }
        }

        // ============ MODAL YÖNETİMİ ============
        function showDreamModal() {
            document.getElementById('dreamModal').classList.remove('hidden');
        }

        function closeDreamModal() {
            document.getElementById('dreamModal').classList.add('hidden');
        }

        function showAnalyzeModal() {
            document.getElementById('analyzeModal').classList.remove('hidden');
        }

        function closeAnalyzeModal() {
            document.getElementById('analyzeModal').classList.add('hidden');
            document.getElementById('analysisResult').classList.add('hidden');
        }

        function showApiKeyInput() {
            document.getElementById('apiKeyModal').classList.remove('hidden');
        }

        function closeApiKeyModal() {
            document.getElementById('apiKeyModal').classList.add('hidden');
        }

        // ============ GROQ API ============
        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';

        function getApiKey() {
            return localStorage.getItem('groq_api_key');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('groq_api_key', key);
                alert('✅ API Key saved!');
                closeApiKeyModal();
            }
        }

        async function analyzeDream() {
            const dreamText = document.getElementById('analyzeInput').value.trim();
            
            if (!dreamText) {
                alert('Please describe your dream.');
                return;
            }

            const apiKey = getApiKey();
            if (!apiKey) {
                alert('Please set Groq API Key first.');
                showApiKeyInput();
                return;
            }

            const btn = document.getElementById('analyzeBtnModal');
            btn.disabled = true;
            btn.textContent = '🔮 Analyzing...';

            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {
                                role: 'system',
                                content: `You are an AI representing Carl Jung's spirit.
The user is telling you their dream.
Write only one paragraph.
Style: poetic, deep, symbolic, dreamlike.

RULES:
- No medical advice.
- Use words like "perhaps", "possibly", "symbolically".
- No personal comments.
- If text is too short, add a note saying "very brief".
- Respond in the user's language.`
                            },
                            {
                                role: 'user',
                                content: dreamText
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const analysis = data.choices[0].message.content;
                
                document.getElementById('analysisText').textContent = analysis;
                document.getElementById('analysisResult').classList.remove('hidden');
                
            } catch (error) {
                alert('Error: ' + error.message);
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔮 Get Analysis';
            }
        }

        function saveDream() {
            const dreamText = document.getElementById('dreamInput').value.trim();
            if (!dreamText) {
                alert('No dream to save.');
                return;
            }
            
            const dreams = JSON.parse(localStorage.getItem('dreams') || '[]');
            dreams.push({
                text: dreamText,
                timestamp: new Date().toISOString(),
                language: currentLang,
                lat: 39 + (Math.random() - 0.5) * 10,
                lng: 35 + (Math.random() - 0.5) * 20,
                country: 'Global'
            });
            localStorage.setItem('dreams', JSON.stringify(dreams));
            
            alert('✅ Dream saved! It will appear on the map.');
            closeDreamModal();
        }

        // ============ SAYFA YÜKLENDİĞİNDE ============
        window.addEventListener('DOMContentLoaded', () => {
            updateUI();
            
            if (!getApiKey()) {
                setTimeout(() => {
                    if (confirm('No Groq API Key found. Set it now?')) {
                        showApiKeyInput();
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
