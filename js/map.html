<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamPulse - Kolektif Bilinçaltı Haritası</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
        }
        #map {
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        .dream-icon {
            background: rgba(139, 92, 246, 0.8);
            border: 2px solid #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .filter-btn {
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: #8b5cf6;
            color: white;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold mb-2">🌍 Kolektif Bilinçaltı Haritası</h1>
            <p class="text-purple-300">Dünya üzerindeki rüyaların sembolik ısı haritası</p>
        </div>

        <!-- Filtre Butonları -->
        <div class="bg-slate-800/50 rounded-lg p-4 mb-6">
            <h3 class="text-sm font-semibold mb-3 text-gray-300">Sembol Filtresi:</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="filterDreams('all')" class="filter-btn active px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    🌐 Tümü
                </button>
                <button onclick="filterDreams('bear')" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    🐻 Ayı
                </button>
                <button onclick="filterDreams('door')" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    🚪 Kapı
                </button>
                <button onclick="filterDreams('water')" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    💧 Su
                </button>
                <button onclick="filterDreams('fall')" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    ⬇️ Düşüş
                </button>
                <button onclick="filterDreams('fly')" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg text-sm">
                    🕊️ Uçmak
                </button>
            </div>
        </div>

        <!-- Harita -->
        <div id="map"></div>

        <!-- İstatistikler -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
            <div class="bg-slate-800/50 rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-purple-400" id="totalDreams">0</div>
                <div class="text-sm text-gray-400">Toplam Rüya</div>
            </div>
            <div class="bg-slate-800/50 rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-blue-400" id="totalCountries">0</div>
                <div class="text-sm text-gray-400">Ülke</div>
            </div>
            <div class="bg-slate-800/50 rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-green-400" id="topSymbol">-</div>
                <div class="text-sm text-gray-400">En Yaygın Sembol</div>
            </div>
            <div class="bg-slate-800/50 rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-yellow-400" id="todayDreams">0</div>
                <div class="text-sm text-gray-400">Bugün</div>
            </div>
        </div>

        <!-- Geri Dön -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-purple-400 hover:text-purple-300 underline">
                ← Rüya Girişine Dön
            </a>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
